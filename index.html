<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AV Quotation Builder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --ink:#101614; --muted:#5C665F; --paper:#F4F6F3; --surface:#FFFFFF;
  --line:#DEE4DD; --accent:#0C7C59; --accent-dark:#0A5C43; --accent-soft:#E3F1EB;
  --amber:#B4720E; --amber-soft:#F7EDDA; --red:#B3382C; --red-soft:#F7E4E1;
  --mono:'IBM Plex Mono',monospace; --sans:'Archivo',system-ui,sans-serif;
  --radius:10px; --shadow:0 1px 2px rgba(16,22,20,.06),0 4px 16px rgba(16,22,20,.06);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--sans);background:var(--paper);color:var(--ink);font-size:14px;line-height:1.5}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink)}
.num{font-family:var(--mono);font-variant-numeric:tabular-nums}

/* ---------- shell ---------- */
.topbar{position:sticky;top:0;z-index:40;background:var(--ink);color:#EAF0EC;display:flex;align-items:center;gap:16px;padding:0 20px;height:52px}
.topbar .brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:.02em}
.brand-mark{width:22px;height:22px;border-radius:6px;background:var(--accent);display:grid;place-items:center;font-family:var(--mono);font-size:11px;font-weight:600;color:#fff}
.topbar .crumb{color:#9DB0A5;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .spacer{flex:1}
.userchip{display:flex;align-items:center;gap:8px;font-size:12px;color:#C9D6CD}
.userchip img{width:24px;height:24px;border-radius:50%}
.btn{border:1px solid var(--line);background:var(--surface);border-radius:8px;padding:7px 14px;font-weight:600;font-size:13px;color:var(--ink);display:inline-flex;align-items:center;gap:6px;transition:background .12s,border-color .12s}
.btn:hover{background:#F0F3EF}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-dark)}
.btn.ghost{background:transparent;border-color:transparent;color:var(--muted)}
.btn.ghost:hover{color:var(--ink);background:#EDF1EC}
.btn.danger{color:var(--red)}
.btn.danger:hover{background:var(--red-soft)}
.btn.small{padding:4px 10px;font-size:12px}
.btn.dark{background:#1D2A24;border-color:#1D2A24;color:#E5EEE8}
.btn.dark:hover{background:#2A3B33}
.btn:disabled{opacity:.5;cursor:not-allowed}

.wrap{max-width:1180px;margin:0 auto;padding:28px 20px 80px}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.page-head h1{font-size:22px;font-weight:700;letter-spacing:-.01em}
.page-head .sub{color:var(--muted);font-size:13px;margin-top:2px}
.eyebrow{font-family:var(--mono);font-size:10.5px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent)}

.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:22px}
.tab{padding:9px 16px;font-weight:600;font-size:13.5px;color:var(--muted);border:none;background:none;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:var(--ink);border-bottom-color:var(--accent)}
.tab:hover{color:var(--ink)}

.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-pad{padding:18px 20px}

/* ---------- tables ---------- */
table.grid{width:100%;border-collapse:collapse;font-size:13.5px}
table.grid th{font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;font-weight:600;padding:9px 10px;border-bottom:1px solid var(--line);white-space:nowrap}
table.grid td{padding:8px 10px;border-bottom:1px solid #ECF0EB;vertical-align:middle}
table.grid tr:last-child td{border-bottom:none}
table.grid tr.rowlink{cursor:pointer}
table.grid tr.rowlink:hover td{background:#F5F8F5}
.t-right{text-align:right}
.pill{display:inline-block;font-family:var(--mono);font-size:11px;padding:2px 8px;border-radius:99px;background:var(--accent-soft);color:var(--accent-dark);font-weight:600}
.pill.amber{background:var(--amber-soft);color:var(--amber)}
.filterrow th{padding:4px 6px 8px;border-bottom:1px solid var(--line)}
.colfilter{width:100%;border:1px solid var(--line);border-radius:6px;padding:4px 7px;font-size:12px;outline:none;background:#FBFCFB}
.colfilter:focus{border-color:var(--accent)}

/* ---------- forms ---------- */
.field{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.field label{font-size:12px;font-weight:600;color:var(--muted)}
.field input,.field select,.field textarea{border:1px solid var(--line);border-radius:8px;padding:8px 11px;background:#fff;outline:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.field-row{display:grid;gap:14px}
@media(min-width:640px){.field-row.c2{grid-template-columns:1fr 1fr}.field-row.c3{grid-template-columns:1fr 1fr 1fr}}
.inline-input{border:1px solid transparent;border-radius:6px;padding:5px 7px;width:100%;background:transparent;outline:none}
.inline-input:hover{border-color:var(--line)}
.inline-input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 2px var(--accent-soft)}
.inline-input.num{text-align:right}

/* ---------- BoQ editor ---------- */
.section-block{margin-bottom:22px}
.section-head{display:flex;align-items:center;gap:10px;background:#1D2A24;color:#E7EFE9;border-radius:8px 8px 0 0;padding:8px 12px}
.section-head::before{content:"";width:4px;height:20px;border-radius:2px;background:var(--accent);flex:none}
.section-head input{background:transparent;border:none;color:#fff;font-weight:700;font-size:14px;letter-spacing:.02em;flex:1;outline:none;padding:2px 4px;border-radius:4px}
.section-head input:focus{background:rgba(255,255,255,.09)}
.section-head .btn{border-color:rgba(255,255,255,.18);background:transparent;color:#C6D4CA}
.section-head .btn:hover{background:rgba(255,255,255,.1);color:#fff}
.section-body{border:1px solid var(--line);border-top:none;border-radius:0 0 8px 8px;background:#fff;overflow-x:auto}
.boq-table{min-width:820px}
.boq-table td{padding:3px 4px}
.boq-table .rowtools{white-space:nowrap;text-align:right}
.rowtools button{border:none;background:none;color:#9AA79E;padding:3px 4px;border-radius:5px;font-size:13px}
.rowtools button:hover{color:var(--ink);background:#EFF3EF}
.rowtools button.del:hover{color:var(--red);background:var(--red-soft)}
.section-sub{display:flex;justify-content:flex-end;gap:24px;padding:8px 14px;border-top:1px solid var(--line);background:#F8FAF8;font-weight:600}
.addrow-bar{display:flex;gap:8px;padding:8px 10px;border-top:1px dashed var(--line)}

.totals{margin-left:auto;max-width:420px}
.totals .line{display:flex;justify-content:space-between;padding:7px 4px;font-size:14px}
.totals .line.grand{border-top:2px solid var(--ink);font-weight:700;font-size:16px;margin-top:4px;padding-top:10px}

/* ---------- modal / toast ---------- */
.modal-back{position:fixed;inset:0;background:rgba(12,18,15,.45);display:none;align-items:flex-start;justify-content:center;z-index:100;padding:6vh 16px}
.modal-back.open{display:flex}
.modal{background:#fff;border-radius:14px;box-shadow:0 20px 60px rgba(0,0,0,.25);width:100%;max-width:560px;max-height:86vh;display:flex;flex-direction:column}
.modal.wide{max-width:820px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--line)}
.modal-head h3{font-size:16px}
.modal-body{padding:18px 20px;overflow-y:auto}
.modal-foot{padding:14px 20px;border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:10px}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:10px 18px;border-radius:99px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;z-index:200;pointer-events:none}
#toast.show{opacity:1}

/* ---------- login ---------- */
.login-screen{min-height:100vh;display:grid;place-items:center;background:
  radial-gradient(1200px 500px at 70% -10%,rgba(12,124,89,.14),transparent),var(--ink)}
.login-card{background:#fff;border-radius:16px;padding:40px 38px;max-width:420px;width:92%;box-shadow:0 30px 80px rgba(0,0,0,.4)}
.login-card h1{font-size:22px;letter-spacing:-.01em;margin:14px 0 6px}
.login-card p{color:var(--muted);font-size:13.5px;margin-bottom:22px}
.gbtn{width:100%;justify-content:center;padding:11px;font-size:14px}
.cfg-warn{background:var(--amber-soft);color:var(--amber);border-radius:8px;padding:10px 12px;font-size:12.5px;margin-top:16px;font-family:var(--mono)}
.login-meter{display:flex;gap:3px;height:26px;align-items:flex-end;margin-bottom:4px}
.login-meter span{width:5px;background:var(--accent);border-radius:2px;opacity:.9}

/* ---------- empty state ---------- */
.empty{text-align:center;padding:48px 20px;color:var(--muted)}
.empty .eyebrow{display:block;margin-bottom:8px}

/* ---------- print ---------- */
#printArea{display:none}
@media print{
  body{background:#fff}
  #app,.topbar,#toast,#modalBack,.login-screen{display:none!important}
  #printArea{display:block;font-family:var(--sans);color:#111;font-size:11.5px}
  .p-doc{padding:0}
  .p-head{display:flex;justify-content:space-between;border-bottom:3px solid #111;padding-bottom:12px;margin-bottom:6px}
  .p-co{font-size:15px;font-weight:800;letter-spacing:.01em}
  .p-co small{display:block;font-weight:400;color:#444;font-size:10px;margin-top:2px;white-space:pre-line}
  .p-doc-title{text-align:right}
  .p-doc-title h2{font-size:19px;letter-spacing:.12em;font-weight:800}
  .p-meta{width:100%;border-collapse:collapse;margin:10px 0 14px}
  .p-meta td{padding:2.5px 0;font-size:11.5px;vertical-align:top}
  .p-meta td.k{width:110px;color:#555;font-weight:600}
  .p-table{width:100%;border-collapse:collapse;margin-bottom:4px}
  .p-table th{background:#111;color:#fff;font-size:9.5px;letter-spacing:.08em;text-transform:uppercase;padding:6px 7px;text-align:left}
  .p-table td{border-bottom:.6pt solid #CCC;padding:5px 7px;vertical-align:top}
  .p-table .sec td{background:#EDEDED;font-weight:700;font-size:11px;letter-spacing:.03em;border-bottom:.6pt solid #999}
  .p-table .subtotal td{font-weight:700;border-bottom:1.2pt solid #666;background:#FAFAFA}
  .p-tot{width:46%;margin-left:auto;border-collapse:collapse;margin-top:8px}
  .p-tot td{padding:4px 7px;font-size:11.5px}
  .p-tot .g td{border-top:2px solid #111;font-weight:800;font-size:13px}
  .p-notes{margin-top:18px;page-break-inside:avoid}
  .p-notes h4{font-size:10px;letter-spacing:.1em;text-transform:uppercase;border-bottom:1px solid #999;padding-bottom:4px;margin-bottom:6px}
  .p-notes div{white-space:pre-wrap;font-size:10.5px;color:#333}
  .p-sign{margin-top:34px;display:flex;justify-content:space-between;page-break-inside:avoid}
  .p-sign .box{width:220px;font-size:11px}
  .p-sign .line{border-bottom:1px solid #111;height:52px;margin-bottom:5px}
  .p-sign .sname{font-weight:700;font-size:11.5px}
  .p-sign .srole{color:#444;font-size:10px}
  .p-sign .sco{color:#111;font-size:10.5px;font-weight:600;margin-top:1px}
  .num-p{font-family:var(--mono);font-variant-numeric:tabular-nums;white-space:nowrap}
  tr{page-break-inside:avoid}
  @page{margin:16mm 14mm}
}
</style>
</head>
<body>
<!-- ================= LOGIN ================= -->
<div id="loginScreen" class="login-screen">
  <div class="login-card">
    <div class="login-meter" aria-hidden="true">
      <span style="height:8px"></span><span style="height:14px"></span><span style="height:22px"></span>
      <span style="height:26px"></span><span style="height:18px"></span><span style="height:10px"></span>
      <span style="height:16px"></span><span style="height:24px"></span><span style="height:12px"></span>
    </div>
    <span class="eyebrow">Internal tool · restricted access</span>
    <h1>AV Quotation Builder</h1>
    <p>Sign in with an authorized Google account. Project, equipment and quotation data live in a private Google Sheet.</p>
    <button class="btn primary gbtn" id="signInBtn">
      <svg width="16" height="16" viewBox="0 0 48 48"><path fill="#fff" d="M44.5 20H24v8.5h11.8C34.7 33.9 30.1 37 24 37c-7.2 0-13-5.8-13-13s5.8-13 13-13c3.1 0 5.9 1.1 8.1 2.9l6.4-6.4C34.6 4.1 29.6 2 24 2 11.8 2 2 11.8 2 24s9.8 22 22 22c11 0 21-8 21-22 0-1.3-.2-2.7-.5-4z"/></svg>
      Sign in with Google
    </button>
    <div id="cfgWarn" class="cfg-warn" style="display:none"></div>
    <div id="loginErr" class="cfg-warn" style="display:none;background:var(--red-soft);color:var(--red)"></div>
  </div>
</div>

<!-- ================= APP ================= -->
<div id="app" style="display:none">
  <div class="topbar">
    <div class="brand"><span class="brand-mark">AV</span> Quotation Builder</div>
    <span class="crumb" id="crumb"></span>
    <div class="spacer"></div>
    <span id="saveState" style="font-family:var(--mono);font-size:11px;color:#8FA396"></span>
    <div class="userchip" id="userChip"></div>
    <button class="btn small dark" id="signOutBtn">Sign out</button>
  </div>
  <div class="wrap" id="view"></div>
</div>

<!-- ================= MODAL ================= -->
<div class="modal-back" id="modalBack">
  <div class="modal" id="modalBox">
    <div class="modal-head"><h3 id="modalTitle"></h3><button class="btn ghost small" onclick="closeModal()">✕</button></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<div id="toast"></div>
<div id="printArea"></div>

<script>
/* =====================================================================
   CONFIGURATION — edit these four values before deploying
   ===================================================================== */
const CONFIG = {
  // 1. OAuth 2.0 Client ID from Google Cloud Console (type: Web application)
  CLIENT_ID: "726251860471-99131cjfnrcblmbvssms4jtb4kdf8o5u.apps.googleusercontent.com",

  // 2. The ID of your Google Sheet (from its URL:
  //    https://docs.google.com/spreadsheets/d/<THIS_PART>/edit)
  SPREADSHEET_ID: "1LK76WXTTUXxeqLvfRSjUEGSX0cvndGNgRQ20grfQkBU",

  // 3. Extra allowlist (soft gate shown in the UI). Real security comes from
  //    the Sheet's own sharing settings — see README. Leave [] to allow any
  //    account that can open the Sheet.
  ALLOWED_EMAILS: [],

  // 4. Company block printed on the PDF header
  COMPANY: {
    name: "PT. Sinergi Anugrah Mandiri",
    tagline: "Sinergi Acoustic — AV Systems Integration",
    address: "Jakarta, Indonesia",
    contact: "email@company.com · +62 xxx xxxx xxxx"
  }
};
/* Accept a full Sheet URL by mistake: extract the real ID automatically */
{ const m=CONFIG.SPREADSHEET_ID.match(/\/d\/([A-Za-z0-9_-]{20,})/); if(m) CONFIG.SPREADSHEET_ID=m[1]; }

const SHEETS = {
  Equipment:    ["ID","Brand","Series/Type","Description","Category","Unit","Price","Budget Price","Price Updated"],
  Projects:     ["ID","Name","Location","Client","Created","Summary Notes","Signature"],
  Quotations:   ["ID","ProjectID","QuoteNumber","Title","Date","Tax","DataJSON","Updated"],
  NoteTemplates:["ID","Name","Content"],
  SignaturePresets:["ID","Name","JSON"]
};

/* ================= state ================= */
let token=null, tokenExp=0, userEmail="", userPic="";
let DB={equipment:[],projects:[],quotations:[],templates:[],sigPresets:[]};
let route={view:"home",tab:"projects",projectId:null,quoteId:null};
let dirty=false;

const $=s=>document.querySelector(s);
const esc=s=>String(s??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmtRp=n=>new Intl.NumberFormat("id-ID",{style:"currency",currency:"IDR",maximumFractionDigits:0}).format(Number(n)||0);
const fmtN=n=>new Intl.NumberFormat("id-ID",{maximumFractionDigits:2}).format(Number(n)||0);
const todayISO=()=>new Date().toISOString().slice(0,10);
const fmtDate=d=>{ if(!d) return "—"; const dt=new Date(d+"T00:00:00"); return dt.toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"}); };
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove("show"),2400);}
function setDirty(v){dirty=v;$("#saveState").textContent=v?"● unsaved changes":"";}

/* ================= auth ================= */
let tokenClient=null;
function initAuth(){
  const warn=[];
  if(CONFIG.CLIENT_ID.startsWith("PASTE_")) warn.push("CLIENT_ID is not set");
  if(CONFIG.SPREADSHEET_ID.startsWith("PASTE_")) warn.push("SPREADSHEET_ID is not set");
  if(warn.length){const w=$("#cfgWarn");w.style.display="block";w.textContent="⚠ Setup needed: "+warn.join(" · ")+". Edit CONFIG at the top of index.html (see README).";}
  const timer=setInterval(()=>{
    if(window.google?.accounts?.oauth2){
      clearInterval(timer);
      tokenClient=google.accounts.oauth2.initTokenClient({
        client_id:CONFIG.CLIENT_ID,
        scope:"https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email https://www.googleapis.com/auth/userinfo.profile",
        callback:()=>{}
      });
    }
  },100);
}
function requestToken(prompt){
  return new Promise((res,rej)=>{
    if(!tokenClient) return rej(new Error("Google auth library not loaded yet — try again."));
    tokenClient.callback=r=>{
      if(r.error) return rej(new Error(r.error));
      token=r.access_token; tokenExp=Date.now()+(r.expires_in-60)*1000; res();
    };
    tokenClient.requestAccessToken({prompt});
  });
}
async function ensureToken(){ if(!token||Date.now()>tokenExp) await requestToken(""); }
async function signIn(){
  const errBox=$("#loginErr"); errBox.style.display="none";
  try{
    await requestToken("consent");
    let uiRes;
    try{
      uiRes=await fetch("https://www.googleapis.com/oauth2/v3/userinfo",{headers:{Authorization:"Bearer "+token}});
    }catch(e){
      throw new Error("Network blocked while calling www.googleapis.com (userinfo) — usually an ad blocker / tracking protection. Try Incognito with extensions off, or whitelist this site.");
    }
    const ui=await uiRes.json();
    userEmail=ui.email||""; userPic=ui.picture||"";
    if(CONFIG.ALLOWED_EMAILS.length && !CONFIG.ALLOWED_EMAILS.map(e=>e.toLowerCase()).includes(userEmail.toLowerCase()))
      throw new Error(userEmail+" is not on the authorized list for this tool.");
    await ensureTabs();
    await loadAll();
    $("#loginScreen").style.display="none"; $("#app").style.display="block";
    $("#userChip").innerHTML=(userPic?`<img src="${esc(userPic)}" alt="">`:"")+`<span>${esc(userEmail)}</span>`;
    render();
  }catch(e){
    token=null;
    errBox.style.display="block";
    errBox.textContent="✕ "+(e.message||"Sign-in failed. Check that this URL is added to Authorized JavaScript origins and that your account can open the Sheet.");
  }
}
function signOut(){
  if(dirty && !confirm("You have unsaved changes. Sign out anyway?")) return;
  if(token) google.accounts.oauth2.revoke(token,()=>{});
  location.reload();
}

/* ================= Sheets API layer ================= */
const API="https://sheets.googleapis.com/v4/spreadsheets/";
async function api(path,opts={}){
  await ensureToken();
  let r;
  try{
    r=await fetch(API+CONFIG.SPREADSHEET_ID+path,{
      ...opts,
      headers:{Authorization:"Bearer "+token,"Content-Type":"application/json",...(opts.headers||{})}
    });
  }catch(e){
    throw new Error("Network blocked while calling sheets.googleapis.com — usually an ad blocker / tracking protection (uBlock, Brave Shields, Edge Strict mode). Try Incognito with extensions off, or whitelist this site. Also confirm the Google Sheets API is enabled in your Cloud project.");
  }
  if(r.status===401){ token=null; await ensureToken(); return api(path,opts); }
  if(!r.ok){
    const body=await r.json().catch(()=>({}));
    const msg=body.error?.message||r.statusText;
    if(r.status===403) throw new Error("No access to the Sheet ("+msg+"). Make sure "+userEmail+" has Editor access to the spreadsheet.");
    throw new Error("Sheets API: "+msg);
  }
  return r.json();
}
async function ensureTabs(){
  const meta=await api("?fields=sheets.properties.title");
  const existing=(meta.sheets||[]).map(s=>s.properties.title);
  const missing=Object.keys(SHEETS).filter(t=>!existing.includes(t));
  if(missing.length){
    await api(":batchUpdate",{method:"POST",body:JSON.stringify({requests:missing.map(t=>({addSheet:{properties:{title:t}}}))})});
  }
  // always rewrite header rows so schema upgrades (new columns) reach existing sheets
  for(const t of Object.keys(SHEETS)){
    await api(`/values/${encodeURIComponent(t)}!A1?valueInputOption=RAW`,{method:"PUT",
      body:JSON.stringify({values:[SHEETS[t]]})});
  }
}
async function loadAll(){
  const ranges=Object.keys(SHEETS).map(t=>`ranges=${encodeURIComponent(t+"!A2:I")}`).join("&");
  const res=await api("/values:batchGet?"+ranges);
  const [eq,pr,qu,nt,sp]=res.valueRanges.map(v=>v.values||[]);

async function persist(fn,msg){
  try{ $("#saveState").textContent="saving…"; await fn(); setDirty(false); toast(msg||"Saved to Google Sheet"); }
  catch(e){ $("#saveState").textContent=""; alert("Save failed: "+e.message); }

/* ================= helpers: totals ================= */
const lineTotal=i=>(Number(i.qty)||0)*(Number(i.price)||0);
const sectionTotal=s=>s.items.reduce((a,i)=>a+lineTotal(i),0);
const quoteSubtotal=q=>q.sections.reduce((a,s)=>a+sectionTotal(s),0);
const quoteDiscount=q=>{const d=q.discount||{type:"percent",value:0};const sub=quoteSubtotal(q);
  return Math.min(sub,Math.round(d.type==="percent"?sub*(Number(d.value)||0)/100:(Number(d.value)||0)));};
const quoteTax=q=>q.tax?Math.round((quoteSubtotal(q)-quoteDiscount(q))*0.11):0;
const quoteGrand=q=>quoteSubtotal(q)-quoteDiscount(q)+quoteTax(q);
const discLabel=q=>q.discount?.type==="percent"?`Discount (${fmtN(q.discount.value)}%)`:"Discount";
const kindQuotes=(pid,k)=>DB.quotations.filter(q=>q.projectId===pid&&(q.kind||"quote")===k);
/* price staleness */
let priceWarnDays=30;
try{ priceWarnDays=Number(localStorage.getItem("avq_price_warn_days"))||30; }catch(e){}
function setPriceWarnDays(v){ priceWarnDays=Number(v)||30; try{localStorage.setItem("avq_price_warn_days",priceWarnDays);}catch(e){} renderEquipmentRows(); }
function priceAge(e){ if(!e.priceUpdated) return Infinity; return Math.floor((Date.now()-new Date(e.priceUpdated+"T00:00:00").getTime())/86400000); }
function isStale(e){ return priceAge(e)>priceWarnDays; }
function ageLabel(e){ const a=priceAge(e); if(a===Infinity) return "no record"; if(a<=0) return "today"; if(a<31) return a+" d ago"; if(a<365) return Math.round(a/30)+" mo ago"; return (a/365).toFixed(1)+" yr ago"; }
const getProject=id=>DB.projects.find(p=>p.id===id);
const getQuote=id=>DB.quotations.find(q=>q.id===id);
const projectQuotes=pid=>DB.quotations.filter(q=>q.projectId===pid);

}

}
function deriveRAP(qid){
  const src=getQuote(qid);
  const total=src.sections.reduce((a,s)=>a+s.items.length,0);
  const dbHits=src.sections.reduce((a,s)=>a+s.items.filter(it=>{
    const e=DB.equipment.find(x=>x.brand.trim().toLowerCase()===String(it.brand).trim().toLowerCase()
      && x.series.trim().toLowerCase()===String(it.series).trim().toLowerCase());
    return e&&e.cost>0;
  }).length,0);
  openModal("Create RAP from “"+esc(src.title||src.quoteNumber||"Quotation")+"”",`
    <p style="color:var(--muted);font-size:13px;margin-bottom:14px">
      The full BoQ (${total} line${total===1?"":"s"}, all sections and quantities) will be copied into a new RAP.
      Choose how each line's budget price is calculated. ${dbHits} of ${total} lines match an equipment
      database item that has a budget price.</p>
    <div class="field"><label>Price source</label>
      <select id="rap_mode">
        <option value="db_pct" selected>Budget price from database · unmatched lines use % of quote price</option>
        <option value="db_keep">Budget price from database · unmatched lines keep quotation price</option>
        <option value="pct">% of quotation price for ALL lines (ignore database)</option>
      </select></div>
    <div class="field" id="rap_pct_wrap"><label>Cost percentage of quotation price</label>
      <input id="rap_pct" type="number" min="1" max="200" step="any" value="70">
      <span style="font-size:12px;color:var(--muted)">e.g. 70 → a line quoted at Rp 10.000.000 becomes Rp 7.000.000 in the RAP</span></div>`,
    `<button class="btn" onclick="closeModal()">Cancel</button>
     <button class="btn primary" onclick="doDeriveRAP('${qid}')">Create RAP</button>`);
  $("#rap_mode").addEventListener("change",e=>{ $("#rap_pct_wrap").style.display=e.target.value==="db_keep"?"none":"flex"; });
}
async function doDeriveRAP(qid){
  const src=getQuote(qid);
  const mode=$("#rap_mode").value;
  const pct=(Number($("#rap_pct").value)||70)/100;
  const copy=JSON.parse(JSON.stringify(src));
  copy.id=uid(); copy.kind="rap"; copy.quoteNumber="";
  copy.title="RAP — "+(src.title||src.quoteNumber||"Quotation");
  copy.discount={type:"percent",value:0};
  let fromDB=0, fromPct=0, kept=0;
  copy.sections.forEach(sec=>sec.items.forEach(it=>{
    const e=(mode!=="pct")?DB.equipment.find(x=>x.brand.trim().toLowerCase()===String(it.brand).trim().toLowerCase()
      && x.series.trim().toLowerCase()===String(it.series).trim().toLowerCase()):null;
    if(e&&e.cost>0){ it.price=e.cost; fromDB++; }
    else if(mode==="db_keep"){ kept++; }
    else { it.price=Math.round((Number(it.price)||0)*pct); fromPct++; }
  }));
  closeModal();
  DB.quotations.push(copy);
  const parts=[];
  if(fromDB) parts.push(fromDB+" from database");
  if(fromPct) parts.push(fromPct+" at "+Math.round(pct*100)+"% of quote");
  if(kept) parts.push(kept+" kept at quote price");
  await persist(saveQuotes,"RAP created — "+(parts.join(", ")||"empty"));
  go({view:"quote",quoteId:copy.id});
}
async function duplicateQuote(id){
  const q=getQuote(id);
  const copy=JSON.parse(JSON.stringify(q)); copy.id=uid(); copy.title=(q.title||"Quotation")+" (copy)"; copy.quoteNumber="";
  DB.quotations.push(copy); render(); await persist(saveQuotes,"Duplicated");
}
async function deleteQuote(id){
  if(!confirm("Delete this document? It will also be removed from the Google Sheet.")) return;
  DB.quotations=DB.quotations.filter(q=>q.id!==id); render(); await persist(saveQuotes,"Deleted");
}

/* quote mutators */
function qSet(id,k,v){ getQuote(id)[k]=v; setDirty(true); render(); }
function qSetSilent(id,k,v){ getQuote(id)[k]=v; setDirty(true); }
function setDiscount(id,k,v){ const q=getQuote(id); q.discount=q.discount||{type:"percent",value:0}; q.discount[k]=v; setDirty(true); render(); }
function addSection(id){ getQuote(id).sections.push({name:"New Section",items:[]}); setDirty(true); render(); }
function renameSection(id,si,v){ getQuote(id).sections[si].name=v; setDirty(true); }
function removeSection(id,si){ const q=getQuote(id); if(q.sections[si].items.length&&!confirm("Delete this section and its "+q.sections[si].items.length+" line(s)?"))return; q.sections.splice(si,1); setDirty(true); render(); }
function moveSection(id,si,d){ const q=getQuote(id),j=si+d; if(j<0||j>=q.sections.length)return; [q.sections[si],q.sections[j]]=[q.sections[j],q.sections[si]]; setDirty(true); render(); }
function itemSet(id,si,ii,k,v){ getQuote(id).sections[si].items[ii][k]=v; setDirty(true); render(); }
function addManualItem(id,si){ getQuote(id).sections[si].items.push({brand:"",series:"",description:"",qty:1,unit:"unit",price:0}); setDirty(true); render(); }
function removeItem(id,si,ii){ getQuote(id).sections[si].items.splice(ii,1); setDirty(true); render(); }
function moveItem(id,si,ii,d){ const a=getQuote(id).sections[si].items,j=ii+d; if(j<0||j>=a.length)return; [a[ii],a[j]]=[a[j],a[ii]]; setDirty(true); render(); }

    <div class="box">${esc(approverLabel)},<div class="line"></div>
      <div class="sname">${S.apprName?"( "+esc(S.apprName)+" )":blank}</div>
      <div class="sco">${esc(S.apprCompany||defaultApprCompany)}</div></div>
  </div>`;
}
function docHeaderHTML(title,p,metaRows){
  const C=CONFIG.COMPANY;
  return `<div class="p-head">
      <div class="p-co">${esc(C.name)}<small>${esc(C.tagline)}\n${esc(C.address)}\n${esc(C.contact)}</small></div>
      <div class="p-doc-title"><h2>${title}</h2></div>
    </div>
    <table class="p-meta"><tbody>
      ${metaRows.map(([k,v])=>`<tr><td class="k">${k}</td><td>: ${esc(v)}</td></tr>`).join("")}
    </tbody></table>`;
}
function printQuote(qid){
  const q=getQuote(qid), p=getProject(q.projectId);
  if(dirty) persist(saveQuotes); // save silently before export
  let rows="", no=0;
  q.sections.forEach(s=>{
    rows+=`<tr class="sec"><td colspan="8">${esc(s.name).toUpperCase()}</td></tr>`;
    s.items.forEach(it=>{ no++;
      rows+=`<tr><td class="num-p">${no}</td><td>${esc(it.brand)}</td><td>${esc(it.series)}</td><td>${esc(it.description)}</td>
        <td class="num-p" style="text-align:right">${fmtN(it.qty)}</td><td>${esc(it.unit)}</td>
        <td class="num-p" style="text-align:right">${fmtRp(it.price)}</td><td class="num-p" style="text-align:right">${fmtRp(lineTotal(it))}</td></tr>`;
    });
    rows+=`<tr class="subtotal"><td colspan="7" style="text-align:right">Subtotal — ${esc(s.name)}</td><td class="num-p" style="text-align:right">${fmtRp(sectionTotal(s))}</td></tr>`;
  });
  const isRap=q.kind==="rap";
  $("#printArea").innerHTML=`<div class="p-doc">
    ${docHeaderHTML(isRap?"PROJECT BUDGET (RAP)":"QUOTATION",p,[
      ["Project",p.name],["Location",p.location||"—"],
      [(isRap?"RAP no.":"Quotation no."),q.quoteNumber||"—"],["Title",q.title||"—"],
      ["Date",fmtDate(q.date)],["Exported",new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"})]
    ])}
    <table class="p-table">
      <thead><tr><th style="width:24px">No</th><th style="width:80px">Brand</th><th style="width:105px">Series / Type</th><th>Description</th><th style="width:44px;text-align:right">Qty</th><th style="width:44px">Unit</th><th style="width:92px;text-align:right">Unit Price</th><th style="width:96px;text-align:right">Total Price</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <table class="p-tot"><tbody>
      <tr><td>Subtotal</td><td class="num-p" style="text-align:right">${fmtRp(quoteSubtotal(q))}</td></tr>
      ${quoteDiscount(q)>0?`<tr><td>${discLabel(q)}</td><td class="num-p" style="text-align:right">− ${fmtRp(quoteDiscount(q))}</td></tr>`:""}
      <tr><td>PPN 11%${q.tax?"":" (excluded)"}</td><td class="num-p" style="text-align:right">${q.tax?fmtRp(quoteTax(q)):"—"}</td></tr>
      <tr class="g"><td>GRAND TOTAL</td><td class="num-p" style="text-align:right">${fmtRp(quoteGrand(q))}</td></tr>
    </tbody></table>
    ${q.notes.trim()?`<div class="p-notes"><h4>Notes & Terms</h4><div>${esc(q.notes)}</div></div>`:""}
    ${signBlockHTML(p,"Approved by",isRap?"Management — "+CONFIG.COMPANY.name:(p.client||"Client"))}
  </div>`;
  window.print();
}
function printSummary(pid,scope){
  scope=scope||"all";
  if(dirty) persist(saveProjects);
  const p=getProject(pid);
  const quotes=scope==="rap"?[]:kindQuotes(pid,"quote");
  const raps=scope==="quote"?[]:kindQuotes(pid,"rap");
  const tbl=(list,label)=>{
    if(!list.length) return "";
    const g=list.reduce((a,q)=>a+quoteGrand(q),0);
    return `<h4 style="font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;margin:14px 0 5px">${label}</h4>
    <table class="p-table">
      <thead><tr><th style="width:24px">No</th><th style="width:120px">Number</th><th>Title / Scope</th><th style="width:84px">Date</th><th style="width:96px;text-align:right">Subtotal</th><th style="width:84px;text-align:right">Discount</th><th style="width:84px;text-align:right">PPN 11%</th><th style="width:104px;text-align:right">Grand Total</th></tr></thead>
      <tbody>${list.map((q,i)=>`<tr>
        <td class="num-p">${i+1}</td><td class="num-p">${esc(q.quoteNumber||"—")}</td><td>${esc(q.title||"—")}</td>
        <td class="num-p">${fmtDate(q.date)}</td>
        <td class="num-p" style="text-align:right">${fmtRp(quoteSubtotal(q))}</td>
        <td class="num-p" style="text-align:right">${quoteDiscount(q)?"− "+fmtRp(quoteDiscount(q)):"—"}</td>
        <td class="num-p" style="text-align:right">${q.tax?fmtRp(quoteTax(q)):"—"}</td>
        <td class="num-p" style="text-align:right">${fmtRp(quoteGrand(q))}</td></tr>`).join("")}
        <tr class="subtotal"><td colspan="7" style="text-align:right">TOTAL — ${label.toUpperCase()}</td><td class="num-p" style="text-align:right">${fmtRp(g)}</td></tr>
      </tbody></table>`;
  };
  const gq=quotes.reduce((a,q)=>a+quoteGrand(q),0), gr=raps.reduce((a,q)=>a+quoteGrand(q),0);
  $("#printArea").innerHTML=`<div class="p-doc">
    ${docHeaderHTML(scope==="quote"?"QUOTATION SUMMARY":scope==="rap"?"RAP SUMMARY (INTERNAL)":"PROJECT SUMMARY",p,[
      ["Project",p.name],["Location",p.location||"—"],["Client",p.client||"—"],
      ["Exported",new Date().toLocaleDateString("id-ID",{day:"numeric",month:"long",year:"numeric"})]
    ])}
    ${tbl(quotes,"Quotations")}
    ${tbl(raps,"RAP / Budget Estimation")}
    ${(scope==="all"&&quotes.length&&raps.length)?`<table class="p-tot"><tbody>
      <tr><td>Total quotations</td><td class="num-p" style="text-align:right">${fmtRp(gq)}</td></tr>
      <tr><td>Total RAP (budget)</td><td class="num-p" style="text-align:right">${fmtRp(gr)}</td></tr>
      <tr class="g"><td>EST. MARGIN</td><td class="num-p" style="text-align:right">${fmtRp(gq-gr)}</td></tr>
    </tbody></table>`:""}
    ${(p.summaryNotes||"").trim()?`<div class="p-notes"><h4>Notes & Terms</h4><div>${esc(p.summaryNotes)}</div></div>`:""}
    ${signBlockHTML(p,"Approved by",scope==="rap"?"Management — "+CONFIG.COMPANY.name:(p.client||"Client"))}
  </div>`;
  window.print();
}

/* ================= Excel export (SheetJS) ================= */
function needXLSX(){ if(!window.XLSX){ alert("Excel library did not load (check ad blocker / connection) — try refreshing."); return true; } return false; }
function sheetFromAOA(aoa,widths){ const ws=XLSX.utils.aoa_to_sheet(aoa); if(widths) ws["!cols"]=widths.map(w=>({wch:w})); return ws; }
function quoteAOA(q,p){
  const isRap=q.kind==="rap";
  const aoa=[
    [CONFIG.COMPANY.name],[CONFIG.COMPANY.tagline],[],
    [isRap?"PROJECT BUDGET (RAP)":"QUOTATION"],
    ["Project",p.name],["Location",p.location||""],["Number",q.quoteNumber||""],
    ["Title",q.title||""],["Date",q.date||""],["Exported",todayISO()],[],
    ["No","Brand","Series / Type","Description","Qty","Unit","Unit Price (IDR)","Total (IDR)"]
  ];
  let no=0;
  q.sections.forEach(sec=>{
    aoa.push([sec.name.toUpperCase()]);
    sec.items.forEach(it=>{ no++; aoa.push([no,it.brand,it.series,it.description,Number(it.qty)||0,it.unit,Number(it.price)||0,lineTotal(it)]); });
    aoa.push(["","","","","","","Subtotal — "+sec.name,sectionTotal(sec)]);
  });
  aoa.push([]);
  aoa.push(["","","","","","","Subtotal",quoteSubtotal(q)]);
  if(quoteDiscount(q)>0) aoa.push(["","","","","","",discLabel(q),-quoteDiscount(q)]);
  aoa.push(["","","","","","","PPN 11%"+(q.tax?"":" (excluded)"),quoteTax(q)]);
  aoa.push(["","","","","","","GRAND TOTAL",quoteGrand(q)]);
  if(q.notes.trim()){ aoa.push([]); aoa.push(["Notes & Terms"]); q.notes.split("\n").forEach(l=>aoa.push([l])); }
  return aoa;
}
function exportQuoteXlsx(qid){
  if(needXLSX()) return;
  const q=getQuote(qid), p=getProject(q.projectId);
  if(dirty) persist(saveQuotes);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,sheetFromAOA(quoteAOA(q,p),[5,16,20,44,7,8,16,16]),(q.kind==="rap"?"RAP":"Quotation").slice(0,31));
  const fname=((q.quoteNumber||q.title||"quotation").replace(/[\\/:*?"<>|]/g,"-"))+".xlsx";
  XLSX.writeFile(wb,fname); toast("Excel exported");
}
function exportSummaryXlsx(pid,scope){
  scope=scope||"all";
  if(needXLSX()) return;
  const p=getProject(pid);
  const quotes=scope==="rap"?[]:kindQuotes(pid,"quote");
  const raps=scope==="quote"?[]:kindQuotes(pid,"rap");
  const wb=XLSX.utils.book_new();
  const sumAOA=[[CONFIG.COMPANY.name],[(scope==="quote"?"QUOTATION SUMMARY — ":scope==="rap"?"RAP SUMMARY (INTERNAL) — ":"PROJECT SUMMARY — ")+p.name],["Location",p.location||""],["Client",p.client||""],["Exported",todayISO()],[],
    ["Type","No","Number","Title","Date","Subtotal","Discount","PPN 11%","Grand Total"]];
  const push=(list,label)=>list.forEach((q,i)=>sumAOA.push([label,i+1,q.quoteNumber||"",q.title||"",q.date||"",quoteSubtotal(q),-quoteDiscount(q)||0,quoteTax(q),quoteGrand(q)]));
  push(quotes,"Quotation"); push(raps,"RAP");
  const gq=quotes.reduce((a,q)=>a+quoteGrand(q),0), gr=raps.reduce((a,q)=>a+quoteGrand(q),0);
  sumAOA.push([]);
  if(quotes.length) sumAOA.push(["","","","","","","","Total quotations",gq]);
  if(raps.length)   sumAOA.push(["","","","","","","","Total RAP",gr]);
  if(scope==="all"&&quotes.length&&raps.length) sumAOA.push(["","","","","","","","EST. MARGIN",gq-gr]);
  if((p.summaryNotes||"").trim()){ sumAOA.push([]); sumAOA.push(["Notes & Terms"]); p.summaryNotes.split("\n").forEach(l=>sumAOA.push([l])); }
  XLSX.utils.book_append_sheet(wb,sheetFromAOA(sumAOA,[10,5,18,30,12,15,12,12,15]),"Summary");
  quotes.concat(raps).forEach((q,i)=>{
    const nm=((q.kind==="rap"?"RAP ":"Q ")+(q.quoteNumber||q.title||i+1)).replace(/[\\/:*?\[\]"<>|]/g,"-").slice(0,31)||("Doc"+(i+1));
    XLSX.utils.book_append_sheet(wb,sheetFromAOA(quoteAOA(q,p),[5,16,20,44,7,8,16,16]),nm);
  });
  XLSX.writeFile(wb,(p.name.replace(/[\\/:*?"<>|]/g,"-"))+(scope==="quote"?" - quotation summary":scope==="rap"?" - RAP summary":" - summary")+".xlsx"); toast("Excel exported");
}
